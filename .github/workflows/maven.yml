name: Build & Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 24

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Archive JAR
        uses: actions/upload-artifact@v3
        with:
          name: jar
          path: target/*.jar

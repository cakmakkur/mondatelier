spring.application.name=mondatelier
spring.profiles.default=dev

# Time zone
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Persistence. Add Flyway before changing this to validate.
spring.jpa.hibernate.ddl-auto=none
spring.datasource.driver-class-name=org.postgresql.Driver

# Authentication
security.jwt.secret-key=${JWT_SECRET}
security.jwt.refresh-secret-key=${JWT_REFRESH_SECRET}
security.jwt.expiration-time=${JWT_ACCESS_EXPIRATION_MS:3600000}
security.jwt.refresh-expiration-time=${JWT_REFRESH_EXPIRATION_MS:604800000}
security.jwt.cookie-secure=${AUTH_COOKIE_SECURE:false}

# File upload. Endpoint-specific validation is still required.
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:100MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:100MB}
app.upload.dir=${UPLOAD_DIR:../uploads}

# Browser client
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Community
app.community.feed-limit=15
app.community.comment-limit=10

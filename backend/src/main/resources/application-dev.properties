#time zone
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# data source
spring.datasource.url=jdbc:postgresql://localhost:5432/mondatelier
spring.datasource.username=mondatelier
spring.datasource.password=mondatelier
spring.datasource.driver-class-name=org.postgresql.Driver

# jpa
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.hibernate.ddl-auto=none

#file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

# error handling
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# security
security.jwt.secret-key=bd14230623ed0ca1d61d3cd737317e9b11a4f031d8a231eaa736b77b780ddbfa
security.jwt.expiration-time=8640000

# frontend
app.frontend.url=http://localhost:5173
app.upload.dir=../uploads


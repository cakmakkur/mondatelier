

# Application name
spring.application.name=mondatelier-test

# Time zone
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Data source for tests
spring.datasource.url=jdbc:postgresql://localhost:5432/mondateliertestdb
spring.datasource.username=mondatelier
spring.datasource.password=mondatelier
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create-drop
